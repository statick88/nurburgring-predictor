name: 🏁 Race Data Scraper

on:
  # Run every 30 seconds during race weekend
  schedule:
    # Race practice - every 5 minutes
    - cron: '*/5 10-15 24 5 *'
    - cron: '*/5 18-21 24 5 *'
    # Main race - every 30 seconds (24 hours)
    - cron: '*/30 * 25 5 *'
    - cron: '*/30 * 26 5 0-10'
    # Cool-down
    - cron: '*/5 10-15 26 5 *'
  # Manual trigger
  workflow_dispatch:
    inputs:
      force:
        description: 'Force immediate run'
        required: false
        default: 'false'

env:
  AZURE_URL: 'https://livetiming.azurewebsites.net/event=50?config=w3'
  BACKEND_URL: ${{ vars.BACKEND_URL || 'http://localhost:3000' }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          npm ci --prefix backend-node
          npx playwright install chromium --with-deps

      - name: 🏎️ Run scraper
        run: |
          cd backend-node
          node ../scripts/fetch-race-data.js
        env:
          AZURE_URL: ${{ env.AZURE_URL }}
          BACKEND_URL: ${{ env.BACKEND_URL }}
          NODE_ENV: production

      - name: 📊 Report metrics
        if: always()
        run: |
          echo "Run completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Status: ${{ job.status }}"